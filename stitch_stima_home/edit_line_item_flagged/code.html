<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Line Item - Stima</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-tint": "#1b6b51",
                        "surface-container-highest": "#d5e3fc",
                        "on-surface-variant": "#3f4944",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#d5e3fc",
                        "error": "#ba1a1a",
                        "surface-container": "#e6eeff",
                        "tertiary": "#5b3300",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#a6f2d1",
                        "primary-fixed-dim": "#8bd6b6",
                        "secondary-fixed-dim": "#ffb3ac",
                        "secondary-fixed": "#ffdad6",
                        "tertiary-container": "#7b4700",
                        "on-primary-fixed": "#002116",
                        "on-background": "#0d1c2e",
                        "on-tertiary-fixed": "#2c1600",
                        "tertiary-fixed": "#ffdcbe",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-tertiary-container": "#ffba73",
                        "on-primary-container": "#8bd6b7",
                        "inverse-surface": "#233144",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary-fixed-dim": "#ffb870",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "primary": "#004532",
                        "outline": "#6f7973",
                        "on-primary-fixed-variant": "#00513b",
                        "on-secondary-fixed-variant": "#73332f",
                        "background": "#f8f9ff",
                        "primary-container": "#065f46",
                        "on-surface": "#0d1c2e",

                        "secondary-container": "#fda49c",

                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .glass-nav { backdrop-filter: blur(12px); }
        .ghost-shadow { shadow: 0 0 24px 0 rgba(13, 28, 46, 0.04); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-low min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-white dark:bg-slate-950">
<div class="flex items-center gap-3">
<button class="text-emerald-900 dark:text-emerald-500 active:scale-95 transition-transform duration-150 p-2 rounded-full hover:bg-slate-50">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Review &amp; Edit</span>
<h1 class="font-['Space_Grotesk'] font-bold tracking-tight text-emerald-900 dark:text-emerald-500 text-lg leading-tight">Edit Line Item</h1>
</div>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto">
<!-- AI Confidence Note Banner -->
<div class="mb-8 flex items-start gap-3 p-4 bg-warning/10 border-l-4 border-warning rounded-r-lg shadow-[0_4px_24px_rgba(245,158,59,0.08)] backdrop-blur-sm">
<span class="material-symbols-outlined text-warning" style="font-variation-settings: 'FILL' 1;">error</span>
<div>
<p class="font-headline text-[11px] font-bold tracking-widest text-warning uppercase mb-0.5">AI CONFIDENCE NOTE</p>
<p class="text-sm font-medium text-on-surface">Price could not be confirmed from your notes.</p>
</div>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_0_24px_rgba(13,28,46,0.04)]">
<form class="space-y-8">
<!-- Description Field -->
<div class="group">
<label class="block font-headline text-sm font-bold tracking-tight text-on-surface-variant mb-2">Description <span class="text-destructive">*</span></label>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary text-on-surface px-4 py-3 transition-all duration-200" required="" type="text" value="Custom Hardwood Decking Installation"/>
</div>
<!-- Details Field -->
<div class="group">
<label class="block font-headline text-sm font-bold tracking-tight text-on-surface-variant mb-2">Details</label>
<textarea class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary text-on-surface px-4 py-3 transition-all duration-200 resize-none" placeholder="Additional details or specifications..." rows="3">Ipe wood boards, stainless steel fasteners, joist tape applied to entire frame. 350 sq ft total coverage.</textarea>
</div>
<!-- Price Field -->
<div class="group">
<label class="block font-headline text-sm font-bold tracking-tight text-on-surface-variant mb-2">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">$</span>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary text-on-surface pl-8 pr-4 py-3 transition-all duration-200" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</form>
</div>
<!-- Asymmetric Decorative Element -->
<div class="mt-8 flex justify-end">
<div class="h-1 w-24 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<!-- Bottom Actions Container -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl z-50 px-6 pb-8 pt-4 flex flex-col gap-3 shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<!-- Save Changes Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded shadow-lg active:scale-95 transition-all duration-200 uppercase tracking-widest text-sm">
            Save Changes
        </button>
<!-- Delete Line Item Button -->
<button class="w-full border-2 border-destructive/20 text-destructive font-headline font-bold py-4 rounded hover:bg-destructive/5 active:scale-95 transition-all duration-200 uppercase tracking-widest text-sm">
            Delete Line Item
        </button>
</div>
<!-- Background Blueprint Pattern (Abstract Aesthetic) -->
<div class="fixed inset-0 -z-10 opacity-[0.03] pointer-events-none" data-alt="Abstract subtle green grid pattern representing architectural blueprint lines" style="background-image: radial-gradient(#065F46 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
</body></html>
