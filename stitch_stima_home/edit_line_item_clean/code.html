<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Line Item - Stima</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#ccdbf3",
                        "surface": "#f8f9ff",
                        "on-secondary-container": "#783733",
                        "surface-container-high": "#dce9ff",
                        "surface-bright": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "secondary": "#904a45",
                        "inverse-primary": "#8bd6b6",
                        "error-container": "#ffdad6",
                        "surface-tint": "#1b6b51",
                        "surface-container-highest": "#d5e3fc",
                        "on-surface-variant": "#3f4944",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#d5e3fc",
                        "error": "#ba1a1a",
                        "surface-container": "#e6eeff",
                        "tertiary": "#5b3300",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#a6f2d1",
                        "primary-fixed-dim": "#8bd6b6",
                        "secondary-fixed-dim": "#ffb3ac",
                        "secondary-fixed": "#ffdad6",
                        "tertiary-container": "#7b4700",
                        "on-primary-fixed": "#002116",
                        "on-background": "#0d1c2e",
                        "on-tertiary-fixed": "#2c1600",
                        "tertiary-fixed": "#ffdcbe",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-tertiary-container": "#ffba73",
                        "on-primary-container": "#8bd6b7",
                        "inverse-surface": "#233144",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary-fixed-dim": "#ffb870",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "primary": "#004532",
                        "outline": "#6f7973",
                        "on-primary-fixed-variant": "#00513b",
                        "on-secondary-fixed-variant": "#73332f",
                        "background": "#f8f9ff",
                        "primary-container": "#065f46",
                        "on-surface": "#0d1c2e",
                        "outline-variant": "#bec9c2",
                        "secondary-container": "#fda49c",
                        "on-secondary-fixed": "#3b0908",
                        "on-primary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .architectural-shadow {
            box-shadow: 0 4px 24px rgba(13, 28, 46, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-white dark:bg-slate-950">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center w-10 h-10 rounded-full active:scale-95 transition-transform duration-150 hover:bg-slate-50 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-emerald-900 dark:text-emerald-500">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold font-label">Review &amp; Edit</span>
<h1 class="text-emerald-900 dark:text-emerald-500 font-['Space_Grotesk'] font-bold tracking-tight text-lg">Edit Line Item</h1>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-16 px-4 py-8 max-w-2xl mx-auto w-full">
<!-- Blueprint Style Header Info (Visual anchor, non-editable here) -->
<!-- Form Container -->
<div class="bg-surface-container-lowest architectural-shadow rounded-lg p-6 space-y-8">
<!-- Description Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-headline font-bold text-sm tracking-tight text-on-surface" for="description">Description</label>
<span class="font-label text-[10px] text-primary-container font-bold uppercase tracking-tighter">Required</span>
</div>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface font-body text-sm py-3 px-4 transition-all" id="description" name="description" placeholder="Enter line item title..." type="text" value="Premium Quartz Countertop Installation"/>
</div>
<!-- Details Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-headline font-bold text-sm tracking-tight text-on-surface" for="details">Details</label>
<span class="font-label text-[10px] text-outline font-medium uppercase tracking-tighter">Optional</span>
</div>
<textarea class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface font-body text-sm py-3 px-4 transition-all resize-none" id="details" name="details" placeholder="Additional details or specifications..." rows="3">Grade A Calacatta Nuvo Quartz, 3cm thickness with mitered edges. Includes sink cutout and backsplash matching.</textarea>
</div>
<!-- Price Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-headline font-bold text-sm tracking-tight text-on-surface" for="price">Price</label>
<span class="font-label text-[10px] text-outline font-medium uppercase tracking-tighter">Optional</span>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold text-sm">$</span>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface font-body text-sm py-3 pl-8 pr-4 transition-all" id="price" name="price" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</div>
<!-- Meta Info / System Logs (Editorial Touch) -->
</main>
<!-- Bottom Actions -->
<footer class="p-6 space-y-3 max-w-2xl mx-auto w-full mb-20 md:mb-8">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold tracking-tight rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
            Save Changes
        </button>
<button class="w-full h-14 border-2 border-on-secondary-container text-on-secondary-container font-headline font-bold tracking-tight rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-secondary-container/10">
<span class="material-symbols-outlined">delete_forever</span>
            Delete Line Item
        </button>
</footer>
<!-- BottomNavBar -->
</body></html>
