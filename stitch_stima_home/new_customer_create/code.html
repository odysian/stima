<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>New Customer | Stima</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#3f4944",
              "surface": "#f8f9ff",
              "on-tertiary-container": "#ffba73",
              "on-background": "#0d1c2e",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#73332f",
              "surface-container-high": "#dce9ff",
              "surface-bright": "#f8f9ff",
              "primary": "#004532",
              "on-primary-fixed-variant": "#00513b",
              "error": "#ba1a1a",
              "on-secondary-container": "#783733",
              "on-primary-container": "#8bd6b7",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#eaf1ff",
              "tertiary-fixed": "#ffdcbe",
              "surface-container-low": "#eff4ff",
              "on-error-container": "#93000a",
              "surface-container-highest": "#d5e3fc",
              "on-secondary": "#ffffff",
              "error-container": "#ffdad6",
              "outline-variant": "#bec9c2",
              "on-primary-fixed": "#002116",
              "tertiary": "#5b3300",
              "secondary": "#904a45",
              "surface-container": "#e6eeff",
              "background": "#f8f9ff",
              "tertiary-fixed-dim": "#ffb870",
              "outline": "#6f7973",
              "on-secondary-fixed": "#3b0908",
              "tertiary-container": "#7b4700",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#ffdad6",
              "inverse-surface": "#233144",
              "on-tertiary-fixed": "#2c1600",
              "surface-tint": "#1b6b51",
              "primary-fixed-dim": "#8bd6b6",
              "primary-container": "#065f46",
              "inverse-primary": "#8bd6b6",
              "surface-dim": "#ccdbf3",
              "secondary-container": "#fda49c",
              "on-tertiary-fixed-variant": "#693c00",
              "surface-variant": "#d5e3fc",
              "secondary-fixed-dim": "#ffb3ac",
              "primary-fixed": "#a6f2d1",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#0d1c2e"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 shadow-[0_24px_24px_0_rgba(13,28,46,0.04)] sticky top-0 z-40 w-full">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-emerald-900 dark:text-emerald-500 active:scale-95 duration-200 transition-colors p-2 -ml-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-emerald-900 dark:text-emerald-500 font-['Space_Grotesk'] font-bold tracking-tight text-xl">New Customer</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-6 pt-8 pb-32 max-w-2xl mx-auto w-full">
<!-- Section Header mimicking architectural drafting style -->
<form class="space-y-6">
<!-- Name Field (Required) -->
<div class="space-y-2">
<label class="block font-headline text-sm font-semibold tracking-tight text-on-surface-variant" for="customer-name">
                    FULL NAME <span class="text-error">*</span>
</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all text-lg" id="customer-name" name="name" placeholder="e.g. Jonathan Arris" required="" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Phone Field -->
<div class="space-y-2">
<label class="block font-headline text-sm font-semibold tracking-tight text-on-surface-variant" for="customer-phone">
                        PHONE NUMBER
                    </label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all text-lg" id="customer-phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-headline text-sm font-semibold tracking-tight text-on-surface-variant" for="customer-email">
                        EMAIL ADDRESS
                    </label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all text-lg" id="customer-email" name="email" placeholder="j.arris@example.com" type="email"/>
</div>
</div>
</div>
<!-- Address Field (Multi-line) -->
<div class="space-y-2">
<label class="block font-headline text-sm font-semibold tracking-tight text-on-surface-variant" for="customer-address">ADDRESS</label>
<div class="relative">
<textarea class="w-full p-4 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline-variant transition-all text-lg resize-none" id="customer-address" name="address" placeholder="Street, Suite/Apt, City, Zip Code" rows="4"></textarea>
</div>
</div>
<!-- Contextual Note / AI confidence banner placeholder -->
</form>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 shadow-[0_-4px_24px_0_rgba(13,28,46,0.04)]">
<div class="max-w-2xl mx-auto">
<button class="w-full h-16 bg-gradient-to-r from-[#004532] to-[#065f46] text-white font-headline font-bold text-lg rounded shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Create &amp; Continue
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Safe Area Spacer for iOS -->
<div class="h-safe"></div>
</div>
</div>
<!-- Hidden Navigation logic for non-top-level destination -->
<!-- (Suppressed per "The Destination Rule" - this is a transactional creation screen) -->
</body></html>
