<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#e6eeff",
              "outline": "#6f7973",
              "tertiary-container": "#7b4700",
              "tertiary": "#5b3300",
              "surface-container-high": "#dce9ff",
              "tertiary-fixed-dim": "#ffb870",
              "inverse-on-surface": "#eaf1ff",
              "primary": "#004532",
              "surface-tint": "#1b6b51",
              "on-background": "#0d1c2e",
              "inverse-primary": "#8bd6b6",
              "surface-dim": "#ccdbf3",
              "primary-fixed-dim": "#8bd6b6",
              "primary-container": "#065f46",
              "on-tertiary-fixed-variant": "#693c00",
              "surface-container-low": "#eff4ff",
              "on-secondary-fixed": "#3b0908",
              "primary-fixed": "#a6f2d1",
              "error-container": "#ffdad6",
              "surface-bright": "#f8f9ff",
              "on-tertiary-container": "#ffba73",
              "on-surface": "#0d1c2e",
              "secondary-fixed-dim": "#ffb3ac",
              "on-surface-variant": "#3f4944",
              "on-error-container": "#93000a",
              "background": "#f8f9ff",
              "on-secondary": "#ffffff",
              "secondary": "#904a45",
              "surface-variant": "#d5e3fc",
              "outline-variant": "#bec9c2",
              "on-error": "#ffffff",
              "on-primary-container": "#8bd6b7",
              "surface-container-highest": "#d5e3fc",
              "secondary-container": "#fda49c",
              "on-secondary-container": "#783733",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#002116",
              "error": "#ba1a1a",
              "tertiary-fixed": "#ffdcbe",
              "secondary-fixed": "#ffdad6",
              "inverse-surface": "#233144",
              "on-tertiary-fixed": "#2c1600",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#00513b",
              "surface": "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#73332f"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .headline-font {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center">
<!-- Top Branding Anchor -->
<header class="w-full pt-12 pb-8 flex justify-center">
<h1 class="headline-font text-primary-container text-4xl font-bold tracking-tight">Stima</h1>
</header>
<!-- Onboarding Card Container -->
<main class="w-full max-w-md px-6 pb-20">
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-sm">
<!-- Header Section -->
<div class="mb-10 text-left">
<h2 class="headline-font text-on-surface text-2xl font-bold tracking-tight mb-2">Set up your business</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Tell us a bit about your work so we can tailor your quotes.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Business Name -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant flex justify-between" for="business-name">
<span>Business Name</span>
<span class="text-primary text-[10px] font-normal lowercase tracking-normal italic">* Required</span>
</label>
<input class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline-variant transition-all duration-200" id="business-name" placeholder="e.g. Apex Electrical Solutions" required="" type="text"/>
</div>
<!-- Personal Name Row -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="first-name">First Name</label>
<input class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline-variant transition-all duration-200" id="first-name" placeholder="John" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="last-name">Last Name</label>
<input class="w-full px-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-outline-variant transition-all duration-200" id="last-name" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Trade Type Selection -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-1">Trade Type</label>
<div class="grid grid-cols-2 gap-2">
<!-- Plumber -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="plumber"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Plumber
                            </div>
</label>
<!-- Electrician -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="electrician"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Electrician
                            </div>
</label>
<!-- Builder -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="builder"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Builder
                            </div>
</label>
<!-- Painter -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="painter"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Painter
                            </div>
</label>
<!-- Landscaper -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="landscaper"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Landscaper
                            </div>
</label>
<!-- Other -->
<label class="cursor-pointer group">
<input class="peer hidden" name="trade" type="radio" value="other"/>
<div class="px-4 py-3 border-none bg-surface-container-high rounded text-center text-sm font-medium text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white group-hover:bg-surface-variant transition-all duration-200">
                                Other
                            </div>
</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 flex items-center justify-center gap-2 bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded font-bold headline-font tracking-wide hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-sm" type="submit">
                    Continue
                    <span class="material-symbols-outlined text-sm leading-none" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Help -->
<p class="mt-8 text-center text-xs text-on-surface-variant">
            Need help? Contact <a class="text-primary-container underline underline-offset-2" href="#">support@stima.com</a>
</p>
</main>
</body></html>
