<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stima - Register</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ffb870",
              "surface-dim": "#ccdbf3",
              "surface-bright": "#f8f9ff",
              "surface-container-high": "#dce9ff",
              "on-primary-fixed": "#002116",
              "on-primary-fixed-variant": "#00513b",
              "on-primary": "#ffffff",
              "on-primary-container": "#8bd6b7",
              "inverse-on-surface": "#eaf1ff",
              "tertiary": "#5b3300",
              "secondary-fixed-dim": "#ffb3ac",
              "surface-container": "#e6eeff",
              "secondary-fixed": "#ffdad6",
              "primary": "#004532",
              "on-secondary-container": "#783733",
              "tertiary-fixed": "#ffdcbe",
              "surface-container-lowest": "#ffffff",
              "on-background": "#0d1c2e",
              "surface-variant": "#d5e3fc",
              "on-secondary-fixed": "#3b0908",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "on-surface-variant": "#3f4944",
              "outline-variant": "#bec9c2",
              "on-surface": "#0d1c2e",
              "primary-fixed": "#a6f2d1",
              "on-secondary-fixed-variant": "#73332f",
              "on-error-container": "#93000a",
              "primary-fixed-dim": "#8bd6b6",
              "surface-container-low": "#eff4ff",
              "surface": "#f8f9ff",
              "background": "#f8f9ff",
              "surface-tint": "#1b6b51",
              "on-tertiary-fixed": "#2c1600",
              "on-tertiary-fixed-variant": "#693c00",
              "primary-container": "#065f46",
              "surface-container-highest": "#d5e3fc",
              "secondary": "#904a45",
              "outline": "#6f7973",
              "on-tertiary-container": "#ffba73",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-primary": "#8bd6b6",
              "tertiary-container": "#7b4700",
              "secondary-container": "#fda49c",
              "on-secondary": "#ffffff",
              "inverse-surface": "#233144"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-headline {
        font-family: 'Space Grotesk', sans-serif;
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col">
<!-- TopAppBar Replacement -->
<header class="flex items-center justify-center w-full h-24 px-6">
<div class="text-4xl font-headline font-bold text-primary tracking-tighter">
            Stima
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pb-12">
<div class="w-full max-w-md">
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0_4px_24px_rgba(0,0,0,0.04)] p-8 md:p-10">
<div class="mb-8">
<h1 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Create your account</h1>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div class="space-y-1.5">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label" for="email">
                            Email
                        </label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant font-label" for="password">
                                Password
                            </label>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 text-center">
<p class="text-on-surface-variant text-sm font-body">
                        Already have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 transition-all" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Trust Footer suppressed (badges removed as requested) -->
</div>
</main>
</body></html>
