<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#002116",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#ffb870",
              "on-secondary-container": "#783733",
              "secondary-fixed-dim": "#ffb3ac",
              "surface-tint": "#1b6b51",
              "primary": "#004532",
              "on-primary-container": "#8bd6b7",
              "secondary": "#904a45",
              "error-container": "#ffdad6",
              "inverse-surface": "#233144",
              "tertiary": "#5b3300",
              "background": "#f8f9ff",
              "on-surface-variant": "#3f4944",
              "tertiary-container": "#7b4700",
              "surface-container": "#e6eeff",
              "on-secondary-fixed": "#3b0908",
              "on-tertiary": "#ffffff",
              "on-surface": "#0d1c2e",
              "surface-variant": "#d5e3fc",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed": "#2c1600",
              "primary-container": "#065f46",
              "inverse-primary": "#8bd6b6",
              "surface-container-highest": "#d5e3fc",
              "inverse-on-surface": "#eaf1ff",
              "on-background": "#0d1c2e",
              "secondary-container": "#fda49c",
              "primary-fixed-dim": "#8bd6b6",
              "on-tertiary-fixed-variant": "#693c00",
              "on-secondary-fixed-variant": "#73332f",
              "surface-container-low": "#eff4ff",
              "secondary-fixed": "#ffdad6",
              "outline-variant": "#bec9c2",
              "outline": "#6f7973",
              "tertiary-fixed": "#ffdcbe",
              "surface": "#f8f9ff",
              "primary-fixed": "#a6f2d1",
              "surface-bright": "#f8f9ff",
              "on-error": "#ffffff",
              "surface-dim": "#ccdbf3",
              "surface-container-high": "#dce9ff",
              "on-primary-fixed-variant": "#00513b",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#ffba73",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9ff;
      }
      .headline-text {
        font-family: 'Space Grotesk', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="flex items-center w-full px-4 h-16 sticky top-0 z-50 bg-white dark:bg-slate-900">
<div class="flex items-center gap-4 w-full max-w-2xl mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-emerald-900 dark:text-emerald-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Space_Grotesk'] font-bold tracking-tight text-xl text-emerald-900 dark:text-emerald-500">Settings</h1>
</div>
</header>
<main class="max-w-2xl mx-auto px-4 pt-6 pb-32">
<div class="space-y-6">
<!-- Business Profile Card -->
<section class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
<h2 class="font-headline font-bold text-lg mb-6 tracking-tight text-on-surface">Business Profile</h2>
<div class="space-y-5">
<div class="space-y-1.5">
<label class="block text-xs font-bold text-outline uppercase tracking-wider font-label">Business Name</label>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface px-4 py-3 font-body" type="text" value="Stima Architecture &amp; Build"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-bold text-outline uppercase tracking-wider font-label">First Name</label>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface px-4 py-3 font-body" type="text" value="Julian"/>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-bold text-outline uppercase tracking-wider font-label">Last Name</label>
<input class="w-full bg-surface-container-high border-none rounded focus:ring-2 focus:ring-primary-container text-on-surface px-4 py-3 font-body" type="text" value="Ames"/>
</div>
</div>
<div class="space-y-3">
<label class="block text-xs font-bold text-outline uppercase tracking-wider font-label">Trade Type</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
<button class="py-3 px-4 rounded border-2 border-primary-container bg-primary-container/5 text-primary-container font-bold text-sm text-center transition-all hover:bg-primary-container/10">Plumber</button>
<button class="py-3 px-4 rounded border-2 border-transparent bg-surface-container-high text-on-surface-variant font-bold text-sm text-center transition-all hover:bg-surface-container-highest">Electrician</button>
<button class="py-3 px-4 rounded border-2 border-transparent bg-surface-container-high text-on-surface-variant font-bold text-sm text-center transition-all hover:bg-surface-container-highest">Builder</button>
<button class="py-3 px-4 rounded border-2 border-transparent bg-surface-container-high text-on-surface-variant font-bold text-sm text-center transition-all hover:bg-surface-container-highest">Painter</button>
<button class="py-3 px-4 rounded border-2 border-transparent bg-surface-container-high text-on-surface-variant font-bold text-sm text-center transition-all hover:bg-surface-container-highest">Landscaper</button>
<button class="py-3 px-4 rounded border-2 border-transparent bg-surface-container-high text-on-surface-variant font-bold text-sm text-center transition-all hover:bg-surface-container-highest">Other</button>
</div>
</div>
</div>
</section>
<!-- Account Card -->
<section class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
<h2 class="font-headline font-bold text-lg mb-6 tracking-tight text-on-surface">Account</h2>
<div class="flex items-center justify-between gap-4">
<div class="space-y-1">
<label class="block text-xs font-bold text-outline uppercase tracking-wider font-label">Email</label>
<p class="font-body font-medium text-on-surface">architect@stima.com</p>
</div>
<button class="px-5 py-2.5 rounded bg-secondary text-white font-bold text-sm tracking-wide uppercase hover:brightness-110 active:scale-[0.98] transition-all duration-200">
                        Sign Out
                    </button>
</div>
</section>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex flex-col items-center justify-center bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 shadow-[0_-4px_24px_rgba(0,0,0,0.04)] border-t border-slate-100 dark:border-slate-800">
<div class="w-full max-w-2xl">
<button class="w-full bg-primary-container text-on-primary py-4 rounded font-['Inter'] font-bold text-sm uppercase tracking-wider hover:brightness-110 active:scale-[0.98] transition-all duration-200">
                Save Changes
            </button>
</div>
</footer>
</body></html>
