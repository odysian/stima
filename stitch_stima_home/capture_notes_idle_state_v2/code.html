<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ffdcbe",
              "primary": "#004532",
              "on-secondary-fixed-variant": "#73332f",
              "secondary-fixed-dim": "#ffb3ac",
              "secondary-fixed": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#eaf1ff",
              "background": "#f8f9ff",
              "primary-container": "#065f46",
              "on-secondary": "#ffffff",
              "on-background": "#0d1c2e",
              "outline": "#6f7973",
              "on-primary-fixed": "#002116",
              "on-primary-container": "#8bd6b7",
              "surface-dim": "#ccdbf3",
              "secondary": "#904a45",
              "primary-fixed": "#a6f2d1",
              "on-surface": "#0d1c2e",
              "surface-container-low": "#eff4ff",
              "surface-bright": "#f8f9ff",
              "primary-fixed-dim": "#8bd6b6",
              "surface-variant": "#d5e3fc",
              "on-primary": "#ffffff",
              "on-secondary-container": "#783733",
              "inverse-surface": "#233144",
              "secondary-container": "#fda49c",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#3b0908",
              "surface-tint": "#1b6b51",
              "outline-variant": "#bec9c2",
              "on-tertiary-fixed-variant": "#693c00",
              "on-primary-fixed-variant": "#00513b",
              "surface-container-highest": "#d5e3fc",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#ffb870",
              "surface-container-high": "#dce9ff",
              "surface-container": "#e6eeff",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#2c1600",
              "on-error-container": "#93000a",
              "tertiary-container": "#7b4700",
              "on-surface-variant": "#3f4944",
              "surface": "#f8f9ff",
              "inverse-primary": "#8bd6b6",
              "tertiary": "#5b3300",
              "on-tertiary-container": "#ffba73"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .ghost-shadow {
        box-shadow: 0 0 24px rgba(13, 28, 46, 0.04);
      }
      .forest-gradient {
        background: linear-gradient(135deg, #004532 0%, #065f46 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar from JSON Authority -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_0_24px_rgba(13,28,46,0.04)]">
<div class="flex items-center px-4 h-16 w-full">
<button class="mr-4 text-emerald-900 active:scale-95 duration-200 transition-colors hover:bg-slate-50 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline font-bold tracking-tight text-emerald-900 text-lg leading-tight">Capture Job Notes</h1>
<p class="font-label text-xs text-slate-500 font-medium">Record your site visit details or type them manually.</p>
</div>
</div>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 mt-16 mb-64 px-4 pt-6 max-w-2xl mx-auto w-full overflow-y-auto">
<!-- Recorded Clips Section -->
<section class="mb-8">
<div class="flex items-center justify-between mb-3 px-1">
<h2 class="font-headline text-on-surface font-semibold text-sm tracking-wide uppercase">Recorded Clips</h2>
<span class="text-[10px] font-bold text-slate-400 font-label bg-slate-100 px-2 py-0.5 rounded-sm">0 CLIPS</span>
</div>
<!-- Empty State Card -->
<div class="bg-surface-container-lowest border-2 border-dashed border-outline-variant/30 rounded-lg p-10 flex flex-col items-center justify-center text-center ghost-shadow">
<div class="bg-surface-container-low p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-outline-variant text-3xl" data-icon="mic_off">mic_off</span>
</div>
<p class="font-label text-sm text-on-surface-variant font-medium">No clips recorded yet</p>
<p class="font-label text-xs text-slate-400 mt-1 max-w-[180px]">Your voice memos will appear here for transcription.</p>
</div>
</section>
<!-- Written Description Section -->
<section class="mb-8">
<div class="flex items-center mb-3 px-1">
<label class="font-headline text-on-surface font-semibold text-sm tracking-wide uppercase" for="manual-notes">Written Description</label>
</div>
<div class="relative bg-surface-container-lowest rounded-lg ghost-shadow overflow-hidden group focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<textarea class="w-full min-h-[280px] p-5 bg-transparent border-0 focus:ring-0 text-on-surface placeholder:text-slate-300 font-body text-sm leading-relaxed resize-none" id="manual-notes" placeholder="Add manual notes or edit transcribed text here..."></textarea>
<!-- Stylized Corner Accent (Architectural Detail) -->
<div class="absolute top-0 right-0 w-8 h-8 pointer-events-none overflow-hidden">
<div class="absolute top-0 right-0 w-12 h-1 bg-surface-container-high rotate-45 translate-x-4 -translate-y-2"></div>
</div>
</div>
</section>
</main>
<!-- Footer Action Bar (Fixed) -->
<footer class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-xl px-6 pt-8 pb-10 flex flex-col items-center shadow-[0_-10px_30px_rgba(0,0,0,0.03)] border-t border-slate-100">
<!-- Tap to Start Microphone Interaction -->
<div class="flex flex-col items-center mb-8">
<span class="font-headline text-[10px] font-bold tracking-[0.2em] text-primary mb-4 opacity-80">TAP TO START</span>
<button class="w-20 h-20 rounded-full forest-gradient flex items-center justify-center text-white shadow-xl shadow-primary/20 active:scale-90 transition-all hover:brightness-110 group">
<div class="w-full h-full rounded-full flex items-center justify-center relative">
<!-- Subtle pulsing ring effect -->
<div class="absolute inset-0 rounded-full border border-white/20 scale-110 group-hover:scale-125 transition-transform duration-500"></div>
<span class="material-symbols-outlined text-4xl leading-none" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</button>
</div>
<!-- Secondary Global Action -->
<div class="w-full max-w-md">
<button class="w-full py-4 forest-gradient text-white font-headline font-bold text-sm tracking-tight rounded flex items-center justify-center gap-3 shadow-lg shadow-primary/10 active:scale-[0.98] transition-all hover:shadow-xl hover:shadow-primary/15">
<span class="material-symbols-outlined text-xl" data-icon="magic_button">magic_button</span>
                Extract Line Items
            </button>
</div>
<!-- Safe Area Spacer for modern mobile devices -->
<div class="h-2"></div>
</footer>
<!-- No BottomNavBar as per "Remove the bottom navigation bar" instruction -->
</body></html>
