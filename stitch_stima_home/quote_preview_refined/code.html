<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#904a45",
                        "primary-container": "#065f46",
                        "on-tertiary-fixed": "#2c1600",
                        "surface-container-low": "#eff4ff",
                        "inverse-primary": "#8bd6b6",
                        "surface-tint": "#1b6b51",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#8bd6b7",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed-variant": "#00513b",
                        "on-primary-fixed": "#002116",
                        "on-surface": "#0d1c2e",
                        "surface-dim": "#ccdbf3",
                        "secondary-fixed": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-background": "#0d1c2e",
                        "on-tertiary-container": "#ffba73",
                        "surface-container-highest": "#d5e3fc",
                        "on-surface-variant": "#3f4944",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-secondary-fixed": "#3b0908",
                        "outline-variant": "#bec9c2",
                        "tertiary": "#5b3300",
                        "primary": "#004532",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#8bd6b6",
                        "surface-variant": "#d5e3fc",
                        "on-secondary-fixed-variant": "#73332f",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "secondary-fixed-dim": "#ffb3ac",
                        "on-error": "#ffffff",
                        "secondary-container": "#fda49c",
                        "surface-container": "#e6eeff",
                        "background": "#f8f9ff",
                        "on-secondary-container": "#783733",
                        "inverse-surface": "#233144",
                        "tertiary-fixed-dim": "#ffb870",
                        "tertiary-fixed": "#ffdcbe",
                        "primary-fixed": "#a6f2d1",
                        "tertiary-container": "#7b4700",
                        "outline": "#6f7973",
                        "error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .blueprint-pattern {
            background-image: radial-gradient(#bec9c2 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-primary">
<!-- Top Navigation Bar -->
<header class="bg-white sticky top-0 z-50 shadow-[0_0_24px_rgba(0,0,0,0.04)] border-none">
<div class="flex justify-between items-center w-full px-6 h-20 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface active:scale-[0.97] transition-all duration-200 hover:bg-surface-container-low p-2 rounded-full">
                arrow_back
            </button>
<div class="flex items-center gap-3">
<h1 class="font-headline font-bold text-2xl tracking-[-0.02em] text-emerald-900">Q-004</h1>
<span class="bg-emerald-100 text-primary-container text-[0.6875rem] font-bold px-2.5 py-1 rounded-sm uppercase tracking-wider">Ready</span>
</div>
</div>
<div class="w-10"></div>
</div>
</header>
<main class="max-w-screen-xl mx-auto px-6 py-8 flex flex-col gap-9">
<!-- Action Section -->
<section class="flex flex-col md:flex-row gap-4">
<button class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-semibold py-4 px-6 rounded-lg shadow-[0_0_24px_rgba(6,95,70,0.1)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">picture_as_pdf</span>
            Generate PDF
        </button>
<button class="flex-1 border border-outline-variant bg-white text-on-surface-variant font-body font-semibold py-4 px-6 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">share</span>
            Share
        </button>
</section>
<!-- Preview Canvas -->
<section class="relative w-full h-[486px] bg-surface-container-low rounded-xl overflow-hidden shadow-inner group">
<!-- Blueprint texture overlay -->
<div class="absolute inset-0 blueprint-pattern opacity-30 pointer-events-none"></div>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
<div class="bg-white/80 backdrop-blur-md p-12 rounded-xl border border-white/50 shadow-[0_0_40px_rgba(0,0,0,0.02)] max-w-md">
<span class="material-symbols-outlined text-6xl text-outline mb-4 block" style="font-variation-settings: 'wght' 200;">draft</span>
<p class="text-on-surface-variant leading-relaxed font-body text-sm">
                    Generate the PDF to preview it here.
                </p>
</div>
</div>
<!-- Decorative Mockup Element (Glassmorphism layer) -->
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-[85%] h-64 bg-white/40 backdrop-blur-sm rounded-t-2xl border-t border-x border-white/60 shadow-2xl flex flex-col p-8 opacity-40">
<div class="w-1/3 h-4 bg-slate-300/30 rounded mb-4"></div>
<div class="w-2/3 h-3 bg-slate-300/30 rounded mb-2"></div>
<div class="w-1/2 h-3 bg-slate-300/30 rounded"></div>
</div>
</section>
<!-- Metadata Section (Bento style) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
<div class="bg-white p-6 rounded-lg border-l-4 border-primary shadow-sm">
<span class="text-xs font-bold text-outline uppercase block mb-2">Total Amount</span>
<span class="font-headline font-bold text-2xl text-on-surface">$12,450.00</span>
</div>
<div class="bg-white p-6 rounded-lg border-l-4 border-emerald-200 shadow-sm">
<span class="text-xs font-bold text-outline uppercase block mb-2">Client</span>
<span class="font-headline font-bold text-2xl text-on-surface">Modernist Dev.</span>
</div>
</section>
</main>
</body></html>
