<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Review &amp; Edit - Stima</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#002116",
              "primary-container": "#065f46",
              "on-secondary-fixed": "#3b0908",
              "outline-variant": "#bec9c2",
              "surface-variant": "#d5e3fc",
              "on-primary": "#ffffff",
              "surface-dim": "#ccdbf3",
              "surface-bright": "#f8f9ff",
              "inverse-primary": "#8bd6b6",
              "tertiary-container": "#7b4700",
              "on-error": "#ffffff",
              "secondary-fixed-dim": "#ffb3ac",
              "tertiary-fixed-dim": "#ffb870",
              "surface-container": "#e6eeff",
              "secondary-container": "#fda49c",
              "tertiary-fixed": "#ffdcbe",
              "primary-fixed": "#a6f2d1",
              "on-surface-variant": "#3f4944",
              "inverse-surface": "#233144",
              "surface": "#f8f9ff",
              "secondary-fixed": "#ffdad6",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#d5e3fc",
              "secondary": "#904a45",
              "primary": "#004532",
              "on-error-container": "#93000a",
              "on-surface": "#0d1c2e",
              "on-secondary-container": "#783733",
              "tertiary": "#5b3300",
              "inverse-on-surface": "#eaf1ff",
              "error": "#ba1a1a",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#8bd6b6",
              "on-tertiary-fixed": "#2c1600",
              "on-primary-container": "#8bd6b7",
              "surface-container-high": "#dce9ff",
              "surface-tint": "#1b6b51",
              "outline": "#6f7973",
              "on-primary-fixed-variant": "#00513b",
              "surface-container-low": "#eff4ff",
              "on-background": "#0d1c2e",
              "on-tertiary-container": "#ffba73",
              "on-secondary-fixed-variant": "#73332f",
              "on-secondary": "#ffffff",
              "background": "#f8f9ff",
              "on-tertiary-fixed-variant": "#693c00",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-slate-900 shadow-[0_0_24px_rgba(0,0,0,0.04)] flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 text-emerald-900 dark:text-emerald-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-emerald-900 dark:text-emerald-400 font-['Space_Grotesk'] font-bold tracking-tight text-lg">Review &amp; Edit</h1>
</div>
</header>
<main class="pt-20 px-4 space-y-6 max-w-[390px] mx-auto">
<!-- AI Confidence Banner -->
<div class="relative overflow-hidden bg-amber-500/10 border-l-4 border-amber-500 rounded-lg p-4 backdrop-blur-md shadow-[0_0_24px_rgba(0,0,0,0.04)]">
<div class="flex gap-3">
<span class="material-symbols-outlined text-amber-600" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<div class="space-y-1">
<p class="text-[0.6875rem] font-bold text-amber-800 uppercase tracking-wider font-label">AI Confidence Note</p>
<p class="text-sm font-medium text-amber-900 leading-snug">3 line items flagged for your review. Please confirm quantities and pricing.</p>
</div>
</div>
</div>
<!-- Section Header -->
<div class="flex items-end justify-between border-b border-outline-variant/20 pb-2">
<h2 class="text-1.5rem font-bold tracking-tighter text-primary font-headline">Line Items</h2>
<span class="text-[0.6875rem] font-medium text-outline uppercase tracking-[0.1em]">3 Items Extracted</span>
</div>
<!-- Line Items List (Bento-ish Grid layout) -->
<div class="space-y-3">
<!-- Item 1 -->
<button class="w-full text-left group bg-surface-container-lowest rounded-lg p-4 flex items-center justify-between shadow-[0_0_24px_rgba(0,0,0,0.04)] hover:bg-surface-container-low transition-colors active:scale-[0.98] duration-200 border border-amber-500/20">
<div class="space-y-1">
<div class="flex items-center gap-2">
<h3 class="font-bold text-on-surface text-lg tracking-tight font-headline">15m Copper Pipe - 15mm</h3>
<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase">Review</span>
</div>
<div class="flex items-center gap-3 text-sm text-on-surface-variant font-medium">
<span class="flex items-center gap-1"> 15m</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="text-primary font-bold">$225.00</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Item 2 -->
<button class="w-full text-left group bg-surface-container-lowest rounded-lg p-4 flex items-center justify-between shadow-[0_0_24px_rgba(0,0,0,0.04)] hover:bg-surface-container-low transition-colors active:scale-[0.98] duration-200 border border-amber-500/20">
<div class="space-y-1">
<div class="flex items-center gap-2">
<h3 class="font-bold text-on-surface text-lg tracking-tight font-headline">Labor - Plumb New Bath</h3>
<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase">Review</span>
</div>
<div class="flex items-center gap-3 text-sm text-on-surface-variant font-medium">
<span class="flex items-center gap-1"> 1 Unit</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="text-primary font-bold">$450.00</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Item 3 -->
<button class="w-full text-left group bg-surface-container-lowest rounded-lg p-4 flex items-center justify-between shadow-[0_0_24px_rgba(0,0,0,0.04)] hover:bg-surface-container-low transition-colors active:scale-[0.98] duration-200 border border-amber-500/20">
<div class="space-y-1">
<div class="flex items-center gap-2">
<h3 class="font-bold text-on-surface text-lg tracking-tight font-headline">Chrome Mixer Tap</h3>
<span class="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase">Review</span>
</div>
<div class="flex items-center gap-3 text-sm text-on-surface-variant font-medium">
<span class="flex items-center gap-1"> 1 Unit</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="text-primary font-bold">$180.00</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Totals Summary -->
<div class="bg-surface-container-low rounded-lg p-6 space-y-4">
<div class="space-y-3">
<div class="flex justify-between items-center text-sm font-medium text-outline">
<span>Line Item Sum</span>
<span>$855.00</span>
</div>
<div class="pt-4 border-t border-outline-variant/30 space-y-2">
<label class="block font-bold text-on-surface uppercase tracking-wider text-xs font-label" for="total-override">Total Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-primary">$</span>
<input class="w-full bg-white border-2 border-primary rounded-lg py-4 pl-10 pr-4 text-3xl font-bold text-primary font-headline tracking-tighter focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="total-override" type="text" value="940.50"/>
</div>
<p class="text-[10px] text-outline-variant">Tap to override calculated total</p>
</div>
</div>
</div>
<!-- Add Item Ghost Button -->
<button class="w-full py-4 border-2 border-dashed border-outline-variant rounded-lg flex items-center justify-center gap-2 text-outline font-bold hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span>Add Manual Line Item</span>
</button>
<div class="space-y-2 mb-8">
<label class="block text-xs font-bold text-outline-variant uppercase tracking-wider font-label" for="customer-notes">
    Customer Notes
  </label>
<textarea class="w-full bg-white border border-outline-variant/30 rounded-lg p-4 text-sm text-on-surface-variant placeholder:text-outline-variant/60 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all resize-none" id="customer-notes" placeholder="Any notes to include on the quote for the customer." rows="3"></textarea>
</div></main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 space-y-4 shadow-[0_-4px_24px_rgba(0,0,0,0.04)] z-40 border-t border-slate-100 dark:border-slate-800">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-lg font-bold text-lg shadow-lg active:scale-[0.97] transition-transform flex items-center justify-center gap-2">
<span>Generate Quote</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
<!-- BottomNavBar (Hidden for transactional screen as per instruction) -->
<!-- Suppression logic applied: This is a focused 'Review & Edit' task -->
</body></html>
