name: Backend Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-that-is-at-least-32-bytes"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stima
          POSTGRES_PASSWORD: stima
          POSTGRES_DB: stima
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stima"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Cache mypy results
        uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('backend/**/*.py', 'backend/pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy .
      - name: Bandit
        run: bandit -r app/ -x app/core/tests,app/features/auth/tests,app/features/customers/tests,app/features/quotes/tests,app/shared/tests
      - name: Pytest
        run: pytest
