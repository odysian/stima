name: Backend Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-that-is-at-least-32-bytes"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stima
          POSTGRES_PASSWORD: stima
          POSTGRES_DB: stima
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stima"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Cache mypy results
        uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('backend/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt
          backend/.venv/bin/pip install pip-audit==2.10.0
      - name: Validate dependency audit exceptions
        run: python3 scripts/validate_dependency_audit_exceptions.py
      - name: Backend dependency audit
        run: backend/.venv/bin/pip-audit -r backend/requirements.txt
      - name: Template guard
        run: make template-verify
      - name: Backend verify
        run: make backend-verify
