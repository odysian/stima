name: Backend Test

on:
  pull_request:
  workflow_call:

concurrency:
  group: backend-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  backend-static:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Cache mypy results
        uses: actions/cache@v5
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('backend/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-
      - name: Cache Ruff results
        uses: actions/cache@v5
        with:
          path: backend/.ruff_cache
          key: ruff-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            ruff-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-
            ruff-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt
      - name: Template guard
        run: make template-verify
      - name: Backend static verify
        run: make backend-static-verify

  backend-test:
    runs-on: ubuntu-24.04
    env:
      SECRET_KEY: "test-secret-key-that-is-at-least-32-bytes"
      TEST_REDIS_URL: "redis://localhost:6379/15"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stima
          POSTGRES_PASSWORD: stima
          POSTGRES_DB: stima
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stima"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Setup ffmpeg with retry
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          action: FedericoCarboni/setup-ffmpeg@37062fbf7149fc5578d6c57e08aed62458b375d6
          with: |
            ffmpeg-version: 7.0.2
          attempt_limit: 3
          attempt_delay: 15000
      - name: FFmpeg diagnostics
        run: |
          ffmpeg -version
          ffprobe -version
      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt
      - name: Backend test verify
        run: make backend-test-verify
