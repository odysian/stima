name: Template Token Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unresolved-token-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on unresolved tokens in non-template files
        run: ./scripts/check-unresolved-template-tokens.sh
